# Step 2 of the flow: after the (manually reviewed) test PR merges to main,
# run the full Cucumber regression suite against the current code.
name: Cucumber regression

on:
  push:
    branches: [main]
    paths:
      - "java-component/**"
  pull_request:
    paths:
      - "java-component/**"

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run Cucumber regression suite
        run: mvn -f java-component/pom.xml --batch-mode verify

      - name: Upload Cucumber report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: java-component/target/cucumber-report.*
