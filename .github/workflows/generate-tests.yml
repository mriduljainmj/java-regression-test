# Step 1 of the flow: when component code changes land on main, diff the change,
# generate/update Cucumber regression tests, and open a PR for manual review.
name: Generate regression tests

on:
  push:
    branches: [main]
    paths:
      - "java-component/src/main/**"
  workflow_dispatch:
    inputs:
      base:
        description: "Base ref/SHA to diff against (empty = parent of HEAD)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    # Don't react to the test PRs this workflow itself produces.
    if: "${{ github.event_name == 'workflow_dispatch' || (github.event.head_commit && !startsWith(github.event.head_commit.message, 'test: ')) }}"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install agent dependencies
        run: pip install -r testgen-agent/requirements.txt

      - name: Generate Cucumber tests and open PR
        working-directory: testgen-agent
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "testgen-agent"
          git config user.email "testgen-agent@users.noreply.github.com"
          python main.py \
            --repo "$GITHUB_WORKSPACE" \
            --base "${{ github.event.inputs.base || github.event.before }}" \
            --head "${{ github.sha }}"
